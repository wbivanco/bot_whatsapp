name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

env:
  AZURE_WEBAPP_NAME: test-humanidades-wa
  PYTHON_VERSION: '3.10'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Verificar estructura del proyecto
      run: |
        echo "Verificando archivos del proyecto..."
        ls -la
        echo "Verificando backend.py..."
        test -f backend.py && echo "✓ backend.py encontrado" || echo "✗ backend.py no encontrado"
        echo "Verificando requirements.txt..."
        test -f requirements.txt && echo "✓ requirements.txt encontrado" || echo "✗ requirements.txt no encontrado"

    - name: Conocimiento y Chroma en el paquete de deploy
      run: |
        echo "El deploy sube el contenido del repo (package: .). Estas carpetas deben estar commiteadas si querés RAG en Azure:"
        if [ -d files/uploads ]; then
          n=$(find files/uploads -type f ! -name '.DS_Store' | wc -l | tr -d ' ')
          echo "✓ files/uploads: $n archivo(s)"
        else
          echo "⚠ files/uploads no existe en el checkout"
        fi
        if [ -d db/dbchroma ]; then
          echo "✓ db/dbchroma presente (colección embebida local)"
          ls -la db/dbchroma | head -20
        else
          echo "⚠ db/dbchroma no existe en el checkout"
        fi

    - name: Desplegar a Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .

